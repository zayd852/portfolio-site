<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Font for Stranger-Things-style logo -->
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
</head>
 <body>

    <!-- INTRO SCREEN -->
    <div id="intro">
        <h1 class="logo">PERSONAL PORTFOLIO</h1>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-content">
        <header class="header">
            <h1>PORTFOLIO</h1> 
        </header>

        <div id="page-transition"></div>

        <section class="profiles-section">
            <h2>Which person do you want to choose?</h2>

            <div class="profiles">
                <div class="profile" onclick="goToPage('richard.html')">
                    <img src="images/richard.jpg" alt="Richard">
                    <p>Richard</p>
                </div>

                <div class="profile" onclick="goToPage('jhanna.html')">
                    <img src="images/jhanna.jpg" alt="Jhanna">
                    <p>Jhanna</p>
                </div>

                <div class="profile" onclick="goToPage('carl.html')">
                    <img src="images/carl.jpg" alt="Carl">
                    <p>Carl</p>
                </div>

                <div class="profile" onclick="goToPage('sayid.html')">
                    <img src="images/sayid.jpg" alt="Sayid">
                    <p>Sayid</p>
                </div>

                <div class="profile" onclick="goToPage('maria.html')">
                    <img src="images/maria.jpg" alt="Maria">
                    <p>Maria</p>
                </div>
            </div>
        </section>
    </div>

    <!-- JavaScript -->
    <script src="js/script.js"></script>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
    const urlParams = new URLSearchParams(window.location.search);
    const skipIntro = urlParams.get("skipIntro");

    const intro = document.getElementById("intro");

    if (intro) {
        if (skipIntro === "true") {
            intro.style.display = "none";
        } else {
            setTimeout(() => {
                intro.style.display = "none";
            }, 4000);
        }
    }
});
    </script>

</body>
</html>
